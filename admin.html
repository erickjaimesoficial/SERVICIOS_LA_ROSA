<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Formularios - Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>

<body class="bg-light">
  <div id="login-screen" class="container py-5 text-center">
    <h2>Acceso restringido</h2>
    <p>Ingresa la contraseña para acceder al panel:</p>
    <input type="password" id="password" class="form-control w-50 mx-auto mb-3" placeholder="Contraseña" />
    <button onclick="verificarPassword()" class="btn btn-primary">Ingresar</button>
    <p id="error-msg" class="text-danger mt-2"></p>
  </div>

  <div id="panel" style="display:none;" class="container py-5">
    <h1 class="mb-4">Panel de Formularios</h1>
    <div id="form-list" class="table-responsive">
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Mensaje</th>
            <th>Archivo</th>
          </tr>
        </thead>
        <tbody id="form-entries">
          <tr>
            <td colspan="5" class="text-center">Cargando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
  <script src="js/admin-panel.js"></script>
</body>

</html>
